{% extends "base.html" %}
{% block title %}Enviar Trabajo{% endblock %}
{% block content %}
<div class="container-sm mt-3">
    <div class="card">
        <div class="card-header">Envío de Trabajo de Investigación</div>
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label class="label">Título</label>
                <input type="text" name="titulo" class="input" required>
            </div>
            <div class="form-group">
                <label class="label">Resumen</label>
                <textarea name="resumen" class="textarea" required></textarea>
            </div>
            <div class="form-group">
                <label class="label">Área</label>
                <select name="area" class="select" required>
                    <option value="">Seleccione un área</option>
                    <option value="AE">Agroecología</option>
                    <option value="CA">Comunicación Ambiental</option>
                    <option value="EF">Ecofisiología</option>
                    <option value="ES">Ecosistemas</option>
                    <option value="RN">Recursos Naturales</option>
                </select>
            </div>
            <hr class="mb-2">
            <h3 class="mb-2">Datos del Autor</h3>
            <div class="form-group">
                <label class="label">Apellido</label>
                <input type="text" name="apellido" class="input" required>
            </div>
            <div class="form-group">
                <label class="label">Nombre</label>
                <input type="text" name="nombre" class="input" required>
            </div>
            <div class="form-group">
                <label class="label">Correo Electrónico</label>
                <input type="email" name="correo" class="input" required>
            </div>
            <div class="form-group">
                <label class="label">Archivo PDF</label>
                <input type="file" name="archivo" class="input" accept=".pdf" required>
            </div>
            <button type="submit" class="btn btn-primary">Enviar Trabajo</button>
        </form>
    </div>
</div>
{% endblock %}
