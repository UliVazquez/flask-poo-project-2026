{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}
<div class="container-sm">
    <div class="card mt-3">
        <div class="card-header">Acceso Organizador</div>
        <div class="card-body">
            <p class="mb-2">Ingrese sus credenciales para acceder a las funciones de organización del congreso.</p>
            <form method="POST">
                <div class="form-group">
                    <label class="label">Correo Electrónico</label>
                    <input type="email" name="correo" class="input" placeholder="DNI@congreso.com" required>
                </div>
                <div class="form-group">
                    <label class="label">Contraseña</label>
                    <input type="password" name="password" class="input" required>
                </div>
                <div class="flex justify-between align-center mt-2">
                    <a href="/" class="btn btn-secondary">Volver</a>
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
