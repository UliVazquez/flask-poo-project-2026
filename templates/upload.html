{% extends "base.html" %}
{% block title %}Enviar Trabajo{% endblock %}
{% block content %}
<div class="container-sm mt-4" style="max-width: 700px;">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white fw-bold py-3">Envío de Trabajo de Investigación</div>
        <div class="card-body p-4">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Título del Trabajo</label>
                    <input type="text" name="titulo" class="form-control" placeholder="Ej. Estudio sobre el impacto ambiental..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Resumen / Abstract</label>
                    <textarea name="resumen" class="form-control" rows="4" placeholder="Escribí un breve resumen de tu investigación..." required></textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Área de Investigación</label>
                    <select name="area" class="form-select" required>
                        <option value="" selected disabled>Seleccione un área...</option>
                        <option value="AE">Agroecología</option>
                        <option value="CA">Comunicación Ambiental</option>
                        <option value="EF">Ecofisiología</option>
                        <option value="ES">Ecosistemas</option>
                        <option value="RN">Recursos Naturales</option>
                    </select>
                </div>
                <hr class="my-4 text-muted">
                <h4 class="mb-3">Datos del Autor</h4>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Apellido</label>
                        <input type="text" name="apellido" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Correo Electrónico</label>
                    <input type="email" name="correo" class="form-control" placeholder="nombre@ejemplo.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Archivo PDF (Único formato aceptado)</label>
                    <input type="file" name="archivo" class="form-control" accept=".pdf" required>
                    <div class="form-text">Por favor, asegurate de que el archivo no supere el tamaño máximo permitido.</div>
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <button type="submit" class="btn btn-primary px-4 fw-bold">Enviar Trabajo</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
